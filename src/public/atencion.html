
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tótem de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center justify-center py-10">

    <h1 class="text-4xl font-black text-blue-900 mb-10 text-center uppercase tracking-wider">Bienvenido - Tome su Turno</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl px-4 mb-8">
        <button onclick="generar('general')" class="bg-white border-b-8 border-gray-300 p-10 rounded-2xl shadow-xl hover:bg-gray-100 active:border-b-0 active:translate-y-2 transition-all text-center">
            <span class="block text-6xl mb-4">🏠</span>
            <span class="text-2xl font-bold text-gray-700">FILA GENERAL</span>
        </button>
        <button onclick="generar('prioritario')" class="bg-white border-b-8 border-yellow-400 p-10 rounded-2xl shadow-xl hover:bg-yellow-50 active:border-b-0 active:translate-y-2 transition-all text-center">
            <span class="block text-6xl mb-4">♿</span>
            <span class="text-2xl font-bold text-yellow-700">PRIORITARIO</span>
        </button>
    </div>

    <div id="ultimoTicket" class="mt-4 mb-8 text-center hidden">
        <p class="text-xl text-gray-600 font-semibold">Su turno es:</p>
        <p id="numeroTicket" class="text-8xl font-black text-blue-600 animate-bounce mt-2"></p>
    </div>

    <div class="w-full max-w-4xl px-4">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <span>🕒</span> Últimos Turnos Emitidos Hoy
                </h3>
                <button onclick="reiniciarSistema()" class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-3 py-2 rounded-lg shadow transition transform active:scale-95">
                    🔄 Reiniciar Contador (0)
                </button>
            </div>
            <div id="listaHistorialTotem" class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                </div>
        </div>
    </div>

    <script>
        const socket = io(); 
        const listaHistorial = document.getElementById('listaHistorialTotem');

        async function generar(tipo) {
            try {
                const res = await fetch('/api/atencion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cliente: 'Cliente', tipo })
                });
                const data = await res.json();
                
                if (data.numero) {
                    const alertaTicket = document.getElementById('ultimoTicket');
                    document.getElementById('numeroTicket').innerText = data.numero;
                    alertaTicket.classList.remove('hidden');
                    
                    setTimeout(() => { alertaTicket.classList.add('hidden'); }, 5000);
                }
            } catch (err) {
                console.error("Error al generar el turno:", err);
            }
        }

        async function cargarHistorialInicial() {
            try {
                const res = await fetch('/api/atencion');
                const turnos = await res.json();
                renderizarHistorial(turnos);
            } catch (err) {
                console.error("Error cargando historial:", err);
            }
        }

        function renderizarHistorial(turnos) {
            if (!listaHistorial) return;
            listaHistorial.innerHTML = '';
            
            turnos.slice(0, 5).forEach(turno => {
                const esPrioritario = turno.tipo === 'prioritario';
                const item = document.createElement('div');
                item.className = `p-3 rounded-lg text-center font-bold shadow-md transition-all ${
                    esPrioritario ? 'bg-amber-600 text-white border border-amber-500' : 'bg-gray-700 text-gray-200'
                }`;
                item.innerHTML = `
                    <div class="text-[10px] uppercase opacity-70 tracking-wider">${turno.tipo}</div>
                    <div class="text-xl mt-0.5">${turno.numero}</div>
                `;
                listaHistorial.appendChild(item);
            });
        }

        // NUEVA FUNCIÓN PARA SOLICITAR EL RESET AL BACKEND
        async function reiniciarSistema() {
            if (!confirm("⚠️ ¿Estás seguro de que deseas vaciar las filas y reiniciar los contadores desde cero? Esta acción borrará los turnos actuales.")) return;
            
            try {
                const res = await fetch('/api/atencion/reiniciar', { method: 'POST' });
                const data = await res.json();
                alert(data.mensaje);
                cargarHistorialInicial(); // Refresca la vista local
            } catch (err) {
                console.error("Error al reiniciar el sistema:", err);
            }
        }

        socket.on('nuevo-turno-generado', () => {
            cargarHistorialInicial();
        });

        document.addEventListener('DOMContentLoaded', cargarHistorialInicial);
    </script>
</body>
</html>
