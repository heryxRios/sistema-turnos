<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Usuario" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition">Entrar</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('rol', data.usuario.rol);
                // Redirección simple según rol
                if (data.usuario.rol === 'admin') window.location.href = '/admin_usuarios.html';
                else if (data.usuario.rol === 'cajero') window.location.href = '/cajas.html';
            } else { alert(data.mensaje); }
        };
    </script>
</body>
</html>
