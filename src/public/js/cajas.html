<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Caja - Sistema de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="setupCaja" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg text-center">
            <h2 class="text-xl font-bold mb-4">Configurar Ventanilla</h2>
            <input type="number" id="numVentanilla" placeholder="Ej: 5" class="w-full p-2 border mb-4 text-center text-2xl font-bold">
            <button onclick="iniciarCaja()" class="w-full bg-blue-600 text-white p-2 rounded">Iniciar Labores</button>
        </div>
    </div>

    <nav class="bg-green-700 p-4 text-white flex justify-between shadow-lg">
        <h1 class="text-xl font-bold">Ventanilla #<span id="labelVentanilla">--</span></h1>
        <button onclick="logout()" class="text-sm bg-green-900 px-3 py-1 rounded">Salir</button>
    </nav>

    <main class="container mx-auto p-8 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden text-center">
            <div class="p-8 bg-gray-50 border-b">
                <p class="text-gray-500 uppercase tracking-widest font-bold">Turno Actual</p>
                <h2 id="turnoActual" class="text-9xl font-black text-green-600 my-4">---</h2>
            </div>
            
            <div class="p-8 grid grid-cols-1 gap-4">
                <button onclick="llamar('prioritario')" class="bg-yellow-500 hover:bg-yellow-600 text-white p-6 rounded-2xl font-bold text-xl shadow-lg transition transform active:scale-95">
                    Llamar PRIORITARIO ♿
                </button>
                <button onclick="llamar('general')" class="bg-blue-600 hover:bg-blue-700 text-white p-6 rounded-2xl font-bold text-xl shadow-lg transition transform active:scale-95">
                    Llamar GENERAL 🏠
                </button>
                <button onclick="llamar('cualquiera')" class="bg-gray-800 hover:bg-black text-white p-4 rounded-xl font-bold text-sm shadow transition">
                    Llamar Siguiente (Cualquier Fila)
                </button>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        let ventanilla = null;

        if (!token) window.location.href = '/login.html';

        function iniciarCaja() {
            const v = document.getElementById('numVentanilla').value;
            if(!v) return alert('Ingresa un número');
            ventanilla = v;
            document.getElementById('labelVentanilla').innerText = v;
            document.getElementById('setupCaja').classList.add('hidden');
        }

        async function llamar(tipoFila) {
            const res = await fetch('/api/cajas/llamar', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ ventanilla, tipoFila })
            });
            const data = await res.json();
            if(data.turno) {
                document.getElementById('turnoActual').innerText = data.turno.numero;
            } else {
                alert(data.mensaje || "No hay turnos pendientes");
            }
        }

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    </script>
</body>
</html>
