<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-black text-white h-screen overflow-hidden flex flex-col">
    <div class="bg-blue-900 p-6 text-center">
        <h1 class="text-5xl font-bold tracking-widest">LLAMADO DE TURNOS</h1>
    </div>
    <div class="flex-grow flex items-center justify-center">
        <div id="pantallaLlamado" class="text-center p-20 bg-gray-900 rounded-3xl border-4 border-blue-500 shadow-[0_0_50px_rgba(59,130,246,0.5)]">
            <h2 class="text-6xl text-gray-400 uppercase">Turno</h2>
            <p id="turnoActivo" class="text-[15rem] font-black text-yellow-400">---</p>
            <h2 class="text-6xl text-gray-400 uppercase">Ventanilla</h2>
            <p id="cajaActiva" class="text-9xl font-bold text-white">--</p>
        </div>
    </div>
    <audio id="audioNotificacion" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const socket = io();
        const turnoTxt = document.getElementById('turnoActivo');
        const cajaTxt = document.getElementById('cajaActiva');
        const audio = document.getElementById('audioNotificacion');

        socket.on('turno-llamado', (data) => {
            audio.play();
            turnoTxt.innerText = data.numero;
            cajaTxt.innerText = data.ventanilla;
            
            // Efecto de parpadeo
            document.body.classList.add('bg-blue-800');
            setTimeout(() => document.body.classList.remove('bg-blue-800'), 500);
        });
    </script>
</body>
</html>
